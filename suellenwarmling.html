<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suellen Warmling</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: #101010;
    background-image:
      radial-gradient(ellipse 70% 50% at 50% -5%, rgba(252,76,4,0.10) 0%, transparent 65%),
      radial-gradient(ellipse 50% 35% at 85% 95%, rgba(252,76,4,0.06) 0%, transparent 55%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 64px;
    color: #FCE9D9;
  }

  .avatar {
    width: 88px; height: 88px; border-radius: 50%;
    background: linear-gradient(135deg, #FC4C04, #FF6B2B);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 16px;
    box-shadow: 0 0 0 3px rgba(252,76,4,0.2), 0 0 32px rgba(252,76,4,0.15);
  }

  .name {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px; font-weight: 800;
    color: #fff; margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .bio {
    font-size: 13px; color: rgba(252,233,217,0.55);
    margin-bottom: 40px; text-align: center;
    line-height: 1.5; max-width: 280px;
  }

  .links {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%; max-width: 420px;
  }

  .link-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 22px;
    border-radius: 16px;
    text-decoration: none;
    transition: transform .22s cubic-bezier(.22,.68,0,1.2), box-shadow .22s;
    position: relative; overflow: hidden;
  }

  .link-btn:hover {
    transform: translateY(-3px) scale(1.01);
  }

  .link-btn.primary {
    background: linear-gradient(135deg, #FC4C04, #FF6B2B);
    box-shadow: 0 4px 24px rgba(252,76,4,0.35);
  }
  .link-btn.primary:hover {
    box-shadow: 0 8px 36px rgba(252,76,4,0.5);
  }

  .link-btn.secondary {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(252,233,217,0.10);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .link-btn.secondary:hover {
    background: rgba(255,255,255,0.10);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .link-icon {
    font-size: 22px; flex-shrink: 0;
    width: 36px; text-align: center;
  }

  .link-text {
    flex: 1;
  }
  .link-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 800;
    color: #fff; display: block;
    letter-spacing: .2px;
  }
  .link-sub {
    font-size: 11px; color: rgba(255,255,255,0.55);
    margin-top: 2px; display: block;
  }

  .link-btn.primary .link-sub { color: rgba(255,255,255,0.75); }

  .link-arrow {
    font-size: 16px; color: rgba(255,255,255,0.4);
    flex-shrink: 0;
  }
  .link-btn.primary .link-arrow { color: rgba(255,255,255,0.7); }

  .badge {
    position: absolute; top: 10px; right: 12px;
    background: #fff; color: #FC4C04;
    font-size: 9px; font-weight: 800;
    padding: 2px 8px; border-radius: 99px;
    letter-spacing: .8px; text-transform: uppercase;
  }

  .divider {
    width: 100%; max-width: 420px;
    height: 1px; background: rgba(252,233,217,0.08);
    margin: 8px 0;
  }

  .footer {
    margin-top: 48px;
    font-size: 11px; color: rgba(252,233,217,0.2);
    letter-spacing: .5px;
  }
</style>
</head>
<body>

<div class="avatar">👩‍💼</div>
<div class="name">Suellen Warmling</div>
<div class="bio">Marketing para negócios locais. +35 mil empreendedores em quase 40 países.</div>

<div class="links">

  <a href="quiz-apareca-e-venda-v5.html" class="link-btn primary">
    <div class="link-icon">🎯</div>
    <div class="link-text">
      <span class="link-title">Quiz: Seu Instagram vende?</span>
      <span class="link-sub">Descubra o que está travando suas vendas</span>
    </div>
    <div class="link-arrow">›</div>
    <div class="badge">Grátis</div>
  </a>

</div>

<div class="footer">suellenwarmling.com.br</div>

</body>
</html>
